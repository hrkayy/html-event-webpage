<!DOCTYPE html>
<html>
<head>
    <title>Book Your Event</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #3b5b8a;
            color: #333;
            text-align: center;
        }
        h1 {
            color: #e67e22;
            margin-top: 30px;
        }
        nav {
            background-color: #f4d03f;
            padding: 12px;
            border-radius: 8px;
        }
        nav a {
            text-decoration: none;
            color: #333;
            margin: 0 15px;
            font-weight: bold;
        }
        nav a:hover {
            color: #e67e22;
        }
        form {
            margin: 30px auto;
            background-color: #fff;
            padding: 25px;
            width: 60%;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
            text-align: left;
        }
        label {
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background-color: #d35400;
        }
    </style>
</head>

<body>
    <h1>Book Your Event 🥳</h1>
    <nav>
        <a href="home.html">Home</a>
        <a href="upcoming.html">Upcoming Events</a>
        <a href="book.html">Book Event</a>
    </nav>

    <form>
        <label>Full Name:</label>
        <input type="text" placeholder="Enter your name"/>

        <label>Email:</label>
        <input type="email" placeholder="Enter your email"/>

        <label>Event Type:</label>
        <select>
            <option>Wedding</option>
            <option>Corporate</option>
            <option>Birthday</option>
            <option>Concert</option>
        </select>

        <label>Event Date:</label>
        <input type="date"/>

        <label>Additional Notes:</label>
        <textarea rows="4" placeholder="Any special requests..."></textarea>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
